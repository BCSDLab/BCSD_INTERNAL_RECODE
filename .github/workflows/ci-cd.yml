name: CI/CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  deploy:
    needs: [lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout credentials
        uses: actions/checkout@v6
        with:
          repository: BCSDLab/bcsdlab-credentials
          ssh-key: ${{ secrets.CREDENTIALS_REPO_PEM_KEY }}
          path: credentials
          persist-credentials: false

      - name: Upload credentials to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "credentials/bcsd-internal/frontend/*"
          target: "~/BCSD_INTERNAL_RECODE"
          strip_components: 3

      - name: Clean up credentials from runner
        if: always()
        run: rm -rf credentials

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/BCSD_INTERNAL_RECODE
            git fetch origin main
            git reset --hard origin/main
            bash infra/scripts/deploy.sh
